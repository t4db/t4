# single — one T4 node (no S3) vs one etcd node.
#
# T4 runs in local-WAL-only mode: fastest possible configuration but
# without remote durability. Compare with single-s3/ for a fair apples-to-
# apples comparison against etcd's fsync-per-write model.
#
# Ports exposed on the host (for local t4bench invocations):
#   t4  → localhost:3379
#   etcd    → localhost:2379
#
# Images must be pre-built before running:
#   docker build -f bench/Dockerfile.t4 -t t4-bench .
#   docker build -f bench/Dockerfile        -t t4bench  .

services:

  t4:
    image: t4-bench
    command:
      - run
      - --listen=0.0.0.0:2379
      - --data-dir=/data
      - --metrics-addr=0.0.0.0:9090
      - --log-level=warn
    ports:
      - "3379:2379"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    volumes:
      - t4-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks: [bench]

  etcd:
    image: gcr.io/etcd-development/etcd:v3.6.4
    command:
      - etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd0=http://etcd:2380
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd-data
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks: [bench]

  # bench profile: run with
  #   docker compose --profile bench run --rm bench t4bench [flags]
  bench:
    image: t4bench
    profiles: [bench]
    networks: [bench]

networks:
  bench:

volumes:
  t4-data:
  etcd-data:
