{{- if and (not .Values.s3.useIRSA) (not .Values.s3.existingSecret) .Values.s3.credentials.accessKeyId .Values.s3.credentials.secretAccessKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "t4.fullname" . }}-s3
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "t4.labels" . | nindent 4 }}
type: Opaque
stringData:
  T4_S3_ACCESS_KEY_ID: {{ .Values.s3.credentials.accessKeyId | quote }}
  T4_S3_SECRET_ACCESS_KEY: {{ .Values.s3.credentials.secretAccessKey | quote }}
{{- end }}
{{- $clientFacingTLSEnabled := eq (include "t4.clientFacingTLSEnabled" .) "true" }}
{{- $clientFacingTLSSecretName := include "t4.clientTLSSecretName" . }}
{{- $clientFacingTLSSecretProvided := include "t4.clientTLSSecretProvided" . }}
{{- if and $clientFacingTLSEnabled (not $clientFacingTLSSecretProvided) }}
{{- $secretName := $clientFacingTLSSecretName }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $fullname := include "t4.fullname" . }}
{{- $proxyName := printf "%s-proxy" $fullname }}
{{- $dnsNames := list
  $fullname
  (printf "%s.%s" $fullname .Release.Namespace)
  (printf "%s.%s.svc" $fullname .Release.Namespace)
  (printf "%s.%s.svc.cluster.local" $fullname .Release.Namespace)
  $proxyName
  (printf "%s.%s" $proxyName .Release.Namespace)
  (printf "%s.%s.svc" $proxyName .Release.Namespace)
  (printf "%s.%s.svc.cluster.local" $proxyName .Release.Namespace)
  "localhost"
}}
{{- $ips := list "127.0.0.1" }}
{{- $ca := genCA (printf "%s-client-ca" $fullname) 3650 }}
{{- $cert := genSignedCert $fullname $ips $dnsNames 3650 $ca }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "t4.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  {{- if $existing }}
  tls.crt: {{ get $existing.data "tls.crt" | default ($cert.Cert | b64enc) | quote }}
  tls.key: {{ get $existing.data "tls.key" | default ($cert.Key | b64enc) | quote }}
  ca.crt: {{ get $existing.data "ca.crt" | default ($ca.Cert | b64enc) | quote }}
  {{- else }}
  tls.crt: {{ $cert.Cert | b64enc | quote }}
  tls.key: {{ $cert.Key | b64enc | quote }}
  ca.crt: {{ $ca.Cert | b64enc | quote }}
  {{- end }}
{{- end }}
