{{- if .Values.proxy.enabled }}
{{- $root := . }}
{{- $fullname := include "t4.fullname" . }}
{{- $headless := include "t4.headlessServiceName" . }}
{{- $ns := .Release.Namespace }}
{{- $clientPort := int .Values.service.port }}
{{- $metricsPort := int .Values.service.metricsPort }}
{{- $replicas := int .Values.replicaCount }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-proxy
  namespace: {{ $ns }}
  labels:
    {{- include "t4.labels" . | nindent 4 }}
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: grpc_listener
          address:
            socket_address: { address: 0.0.0.0, port_value: 3379 }
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: t4_grpc
                    codec_type: AUTO
                    route_config:
                      name: t4_routes
                      virtual_hosts:
                        - name: t4
                          domains: ["*"]
                          routes:
                            # ── Mutating methods → leader only ─────────────
                            - match: { prefix: "/etcdserverpb.KV/Put" }
                              route: { cluster: t4_leader, timeout: 30s }
                            - match: { prefix: "/etcdserverpb.KV/DeleteRange" }
                              route: { cluster: t4_leader, timeout: 30s }
                            - match: { prefix: "/etcdserverpb.KV/Txn" }
                              route: { cluster: t4_leader, timeout: 30s }
                            - match: { prefix: "/etcdserverpb.KV/Compact" }
                              route: { cluster: t4_leader, timeout: 60s }
                            - match: { prefix: "/etcdserverpb.Lease/LeaseGrant" }
                              route: { cluster: t4_leader, timeout: 30s }
                            - match: { prefix: "/etcdserverpb.Lease/LeaseRevoke" }
                              route: { cluster: t4_leader, timeout: 30s }
                            - match: { prefix: "/etcdserverpb.Lease/LeaseKeepAlive" }
                              route: { cluster: t4_leader, timeout: 0s }
                            - match: { prefix: "/etcdserverpb.Auth" }
                              route: { cluster: t4_leader, timeout: 30s }
                            # ── Reads → all nodes (load balanced) ─────────
                            - match: { prefix: "/" }
                              route: { cluster: t4_all, timeout: 0s }
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        # Leader cluster: only the current leader passes /healthz/leader.
        - name: t4_leader
          type: STATIC
          lb_policy: ROUND_ROBIN
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          health_checks:
            - timeout: 5s
              interval: 10s
              healthy_threshold: 1
              unhealthy_threshold: 2
              http_health_check:
                path: /healthz/leader
          load_assignment:
            cluster_name: t4_leader
            endpoints:
              - lb_endpoints:
                  {{- range $i, $_ := until $replicas }}
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ $fullname }}-{{ $i }}.{{ $headless }}.{{ $ns }}.svc.cluster.local
                          port_value: {{ $clientPort }}
                      health_check_config:
                        port_value: {{ $metricsPort }}
                  {{- end }}

        # All-nodes cluster: reads are spread across every healthy pod.
        - name: t4_all
          type: STATIC
          lb_policy: {{ .Values.proxy.lbPolicy }}
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          health_checks:
            - timeout: 5s
              interval: 10s
              healthy_threshold: 1
              unhealthy_threshold: 2
              http_health_check:
                path: /healthz
          load_assignment:
            cluster_name: t4_all
            endpoints:
              - lb_endpoints:
                  {{- range $i, $_ := until $replicas }}
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ $fullname }}-{{ $i }}.{{ $headless }}.{{ $ns }}.svc.cluster.local
                          port_value: {{ $clientPort }}
                      health_check_config:
                        port_value: {{ $metricsPort }}
                  {{- end }}

    admin:
      address:
        socket_address: { address: 127.0.0.1, port_value: 9901 }
{{- end }}
