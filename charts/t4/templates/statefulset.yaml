apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "t4.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "t4.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "t4.headlessServiceName" . }}
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "t4.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- $metricsPort := (split ":" .Values.config.metricsAddr)._1 | default "9090" }}
        {{- if not (hasKey .Values.podAnnotations "prometheus.io/scrape") }}
        prometheus.io/scrape: "true"
        {{- end }}
        {{- if not (hasKey .Values.podAnnotations "prometheus.io/path") }}
        prometheus.io/path: /metrics
        {{- end }}
        {{- if not (hasKey .Values.podAnnotations "prometheus.io/port") }}
        prometheus.io/port: {{ $metricsPort | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "t4.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "t4.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: t4
          image: {{ include "t4.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          # Build args at runtime so --advertise-peer can include the pod name,
          # which is only known via the downward API.
          command: ["/bin/sh", "-c"]
          args:
            - |
              exec /t4 run \
                --data-dir={{ .Values.config.dataDir | quote }} \
                --listen={{ .Values.config.listenAddr | quote }} \
                --metrics-addr={{ .Values.config.metricsAddr | quote }} \
                --node-id="${MY_POD_NAME}" \
                --log-level={{ .Values.config.logLevel | quote }} \
                --read-consistency={{ .Values.config.readConsistency | quote }} \
                --follower-wait-mode={{ .Values.config.followerWaitMode | quote }} \
                --follower-max-retries={{ .Values.config.followerMaxRetries }} \
                --wal-sync-upload={{ .Values.config.walSyncUpload | quote }} \
                --segment-max-size-mb={{ .Values.config.segmentMaxSizeMb }} \
                --segment-max-age-sec={{ .Values.config.segmentMaxAgeSec }} \
                --checkpoint-interval-min={{ .Values.config.checkpointIntervalMin }} \
                --grpc-keepalive-min-time={{ .Values.config.grpcKeepaliveMinTime | quote }} \
                --grpc-keepalive-interval={{ .Values.config.grpcKeepaliveInterval | quote }} \
                --grpc-keepalive-timeout={{ .Values.config.grpcKeepaliveTimeout | quote }} \
                --grpc-keepalive-permit-without-stream={{ .Values.config.grpcKeepalivePermitWithoutStream }} \
                {{- if gt (int .Values.replicaCount) 1 }}
                --peer-listen={{ .Values.config.peerListenAddr | quote }} \
                {{- if .Values.advertiseAddr }}
                --advertise-peer={{ .Values.advertiseAddr | quote }} \
                {{- else }}
                --advertise-peer="${MY_POD_NAME}{{ include "t4.peerDomainSuffix" . }}" \
                {{- end }}
                {{- end }}
                {{- $effectiveBucket := include "t4.effectiveS3Bucket" . }}
                {{- if $effectiveBucket }}
                --s3-bucket={{ $effectiveBucket | quote }} \
                {{- $effectivePrefix := .Values.s3.prefix | default (ternary .Values.minio.prefix "" .Values.minio.enabled) }}
                {{- if $effectivePrefix }}
                --s3-prefix={{ $effectivePrefix | quote }} \
                {{- end }}
                {{- $effectiveEndpoint := include "t4.effectiveS3Endpoint" . }}
                {{- if $effectiveEndpoint }}
                --s3-endpoint={{ $effectiveEndpoint | quote }} \
                {{- end }}
                {{- end }}
                {{- $clientFacingTLSEnabled := eq (include "t4.clientFacingTLSEnabled" .) "true" }}
                {{- $clientFacingTLSRequireClientCert := eq (include "t4.clientFacingTLSRequireClientCert" .) "true" }}
                {{- if and $clientFacingTLSEnabled (not .Values.proxy.enabled) }}
                --client-tls-cert=/etc/t4/tls/client/tls.crt \
                --client-tls-key=/etc/t4/tls/client/tls.key \
                {{- if $clientFacingTLSRequireClientCert }}
                --client-tls-ca=/etc/t4/tls/client/ca.crt \
                {{- end }}
                {{- end }}
                {{- if .Values.tls.peer.enabled }}
                --peer-tls-cert=/etc/t4/tls/peer/tls.crt \
                --peer-tls-key=/etc/t4/tls/peer/tls.key \
                --peer-tls-ca=/etc/t4/tls/peer/ca.crt \
                {{- end }}
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- $secretName := include "t4.effectiveS3SecretName" . }}
            {{- if $secretName }}
            - name: T4_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: T4_S3_ACCESS_KEY_ID
            - name: T4_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: T4_S3_SECRET_ACCESS_KEY
            {{- end }}
            {{- $effectiveRegion := .Values.s3.region | default (ternary "us-east-1" "" .Values.minio.enabled) }}
            {{- if $effectiveRegion }}
            - name: T4_S3_REGION
              value: {{ $effectiveRegion | quote }}
            {{- end }}
          ports:
            - name: client
              containerPort: {{ (split ":" .Values.config.listenAddr)._1 | default 3379 }}
              protocol: TCP
            {{- if gt (int .Values.replicaCount) 1 }}
            - name: peer
              containerPort: {{ (split ":" .Values.config.peerListenAddr)._1 | default 3380 }}
              protocol: TCP
            {{- end }}
            - name: metrics
              containerPort: {{ (split ":" .Values.config.metricsAddr)._1 | default 9090 }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.config.dataDir }}
            {{- $clientFacingTLSEnabled := eq (include "t4.clientFacingTLSEnabled" .) "true" }}
            {{- if and $clientFacingTLSEnabled (not .Values.proxy.enabled) }}
            - name: tls-client
              mountPath: /etc/t4/tls/client
              readOnly: true
            {{- end }}
            {{- if .Values.tls.peer.enabled }}
            - name: tls-peer
              mountPath: /etc/t4/tls/peer
              readOnly: true
            {{- end }}
            # readOnlyRootFilesystem: /tmp must be writable for the shell and any
            # runtime temp files (e.g. pebble compaction scratch space lives in DataDir,
            # not /tmp, but tools like etcdctl may write to /tmp).
            - name: tmp
              mountPath: /tmp
      volumes:
        {{- $clientFacingTLSEnabled := eq (include "t4.clientFacingTLSEnabled" .) "true" }}
        {{- if and $clientFacingTLSEnabled (not .Values.proxy.enabled) }}
        - name: tls-client
          secret:
            secretName: {{ include "t4.clientTLSSecretName" . }}
        {{- end }}
        {{- if .Values.tls.peer.enabled }}
        - name: tls-peer
          secret:
            secretName: {{ .Values.tls.peer.secretName }}
        {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "t4.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
        {{- with .Values.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution }}
        {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        annotations:
          {{- toYaml .Values.persistence.annotations | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ if eq .Values.persistence.storageClass "-" }}""{{- else }}{{ .Values.persistence.storageClass }}{{- end }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
