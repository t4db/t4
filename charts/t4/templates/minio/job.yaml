{{- if .Values.minio.enabled }}
# This Job runs after install/upgrade and creates the t4 bucket in MinIO.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "t4.minio.fullname" . }}-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "t4.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "t4.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: minio-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: {{ .Values.minio.mcImage.repository }}:{{ .Values.minio.mcImage.tag }}
          imagePullPolicy: {{ .Values.minio.mcImage.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              until mc alias set local \
                "{{ include "t4.minio.endpoint" . }}" \
                "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" \
                --api "S3v4"; do
                echo "Waiting for MinIO to be ready..."
                sleep 3
              done
              mc mb --ignore-existing "local/{{ .Values.minio.bucket }}"
              echo "Bucket '{{ .Values.minio.bucket }}' is ready."
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "t4.minio.secretName" . }}
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "t4.minio.secretName" . }}
                  key: MINIO_ROOT_PASSWORD
{{- end }}
