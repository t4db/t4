# Default values for the t4 Helm chart.

image:
  repository: ghcr.io/t4db/t4
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to .Chart.AppVersion

replicaCount: 1

# Stable node IDs are taken from the StatefulSet pod name (e.g. t4-0).
# advertise-peer is derived automatically as:
#   <pod>.<headless-svc>.<namespace>.svc.cluster.local:<peerPort>
# Override advertiseAddr to use a custom domain (e.g. via Ingress or NodePort).
advertiseAddr: ""

# ── T4 runtime configuration ─────────────────────────────────────────────
config:
  # Directory for Pebble DB and local WAL segments.
  dataDir: /var/lib/t4

  # etcd-compatible gRPC listen address (client-facing).
  listenAddr: "0.0.0.0:3379"

  # Peer replication stream address.  Required when replicaCount > 1.
  peerListenAddr: "0.0.0.0:3380"

  # Prometheus metrics and health probe address.
  metricsAddr: "0.0.0.0:9090"

  # "linearizable" or "serializable"
  readConsistency: linearizable

  # "none" | "quorum" | "all"
  followerWaitMode: quorum

  # Number of stream failures before a follower attempts leader takeover.
  followerMaxRetries: 5

  # Upload each WAL segment to S3 before ACK-ing the write.
  # Set to "false" when using a persistent volume (relies on PVC durability).
  walSyncUpload: "false"

  # WAL segment size in MiB before rotation.
  segmentMaxSizeMb: 50

  # WAL segment age in seconds before rotation.
  segmentMaxAgeSec: 10

  # Leader checkpoint frequency in minutes.
  checkpointIntervalMin: 15

  # gRPC server keepalive policy. Defaults match real etcd; lowering these
  # values risks `GOAWAY too_many_pings` for clients that ping aggressively.
  # Pass plain Go duration strings (e.g. "5s", "20s", "2h").
  grpcKeepaliveMinTime: "5s"
  grpcKeepaliveInterval: "2h"
  grpcKeepaliveTimeout: "20s"
  grpcKeepalivePermitWithoutStream: true

  logLevel: info

# ── S3 / object store ─────────────────────────────────────────────────────────
s3:
  # S3 bucket name.  Required for durability and multi-node mode.
  bucket: ""

  # Key prefix within the bucket (e.g. "k8s/prod").
  prefix: ""

  # AWS region.  Ignored when endpoint is set (S3-compatible stores).
  region: ""

  # Custom endpoint for S3-compatible stores (MinIO, Ceph, etc.).
  endpoint: ""

  # Credentials — choose one of:
  #
  #   useIRSA: true       → annotate the ServiceAccount for EKS IRSA /
  #                          Workload Identity (no secret needed).
  #
  #   existingSecret: ""  → reference a pre-existing Secret whose keys are
  #                         T4_S3_ACCESS_KEY_ID and T4_S3_SECRET_ACCESS_KEY.
  #
  #   credentials: {}     → create a new Secret from these values (not
  #                         recommended for production; prefer IRSA).
  useIRSA: false

  # ARN of the IAM role to annotate on the ServiceAccount (IRSA).
  iamRoleArn: ""

  # Name of an existing Secret with T4_S3_ACCESS_KEY_ID / T4_S3_SECRET_ACCESS_KEY.
  existingSecret: ""

  # Inline credentials — a new Secret is created when non-empty.
  credentials:
    accessKeyId: ""
    secretAccessKey: ""

# ── TLS ───────────────────────────────────────────────────────────────────────
tls:
  # Client-facing gRPC TLS (termination inside t4).
  client:
    enabled: false
    # Name of a Secret with keys tls.crt, tls.key, and optionally ca.crt.
    secretName: ""

  # Peer-to-peer mTLS between t4 nodes.
  peer:
    enabled: false
    secretName: ""

# ── Persistence ───────────────────────────────────────────────────────────────
persistence:
  enabled: true
  # storageClass: "-"  # Use cluster default
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  annotations: {}

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  # etcd-compatible client port.
  port: 3379
  # Peer replication port (used by headless service).
  peerPort: 3380
  # Prometheus metrics port.
  metricsPort: 9090
  annotations: {}

# ── ServiceAccount ────────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ── Tracing (OpenTelemetry) ───────────────────────────────────────────────────
# Set endpoint to enable OTLP trace export; leave empty to disable.
tracing:
  # OTLP gRPC endpoint, e.g. http://otel-collector.monitoring:4317
  endpoint: ""

  # Sampler: always_on | always_off | traceidratio |
  #          parentbased_always_on | parentbased_always_off | parentbased_traceidratio
  sampler: parentbased_always_on

  # Ratio for traceidratio / parentbased_traceidratio samplers (0.0–1.0).
  samplerArg: ""

  # Service name reported in trace resource attributes.
  serviceName: t4

# ── Prometheus ServiceMonitor ─────────────────────────────────────────────────
serviceMonitor:
  enabled: false
  # Namespace where the Prometheus Operator is watching for ServiceMonitors.
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

# ── Pod configuration ─────────────────────────────────────────────────────────
podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 65532

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

# ── Probes ────────────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /healthz
    port: metrics
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: metrics
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# ── Scheduling ────────────────────────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels: {}  # filled in by _helpers.tpl
          topologyKey: kubernetes.io/hostname

imagePullSecrets: []

# ── Envoy proxy (optional) ────────────────────────────────────────────────────
# When enabled, deploys a small Envoy Deployment that:
#   - Routes mutating gRPC methods (Put, DeleteRange, Txn, Compact, Lease*, Auth*)
#     exclusively to the current leader (detected via /healthz/leader).
#   - Load-balances read methods (Range, Watch, ...) across all healthy nodes,
#     giving ~N× read throughput with serializable consistency.
#
# Clients connect to the proxy Service instead of t4 directly.
# Requires replicaCount > 1 and config.metricsAddr to be set.
proxy:
  enabled: false

  image:
    repository: envoyproxy/envoy
    tag: v1.33-latest
    pullPolicy: IfNotPresent

  replicaCount: 2

  service:
    type: ClusterIP
    port: 3379
    annotations: {}

  # Load balancing policy for the read cluster (all nodes).
  # ROUND_ROBIN    — default, even distribution by request count.
  # LEAST_REQUEST  — routes to the replica with fewest active requests;
  #                  better when read latency varies across nodes.
  # RANDOM         — uniform random selection.
  # RING_HASH      — consistent hashing on the downstream address;
  #                  useful to maximise local cache hit rates per node.
  # MAGLEV         — consistent hashing with better load spread than RING_HASH.
  #
  # Note: the write cluster (t4_leader) always uses ROUND_ROBIN because
  # only one endpoint is ever healthy — the policy has no practical effect there.
  lbPolicy: ROUND_ROBIN

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

  podAnnotations: {}
  podLabels: {}

  nodeSelector: {}
  tolerations: []

# ── MinIO (built-in S3 for development / CI) ──────────────────────────────────
# When enabled, deploys a single-node MinIO instance alongside T4 and
# automatically wires up s3.bucket, s3.endpoint, and S3 credentials so no
# external object store is needed.
#
# ⚠  Not recommended for production.  Use a managed S3 service or a dedicated
#    MinIO cluster instead.
minio:
  enabled: false

  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent

  # Credentials for the MinIO root user.  Also used as T4_S3_ACCESS_KEY_ID /
  # T4_S3_SECRET_ACCESS_KEY when t4 connects to MinIO.
  rootUser: minioadmin
  rootPassword: minioadmin  # Change this!

  # Bucket that t4 will use.  Created automatically by the init job.
  bucket: t4

  # Optional key prefix within the bucket (e.g. "dev/").
  prefix: ""

  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  service:
    # S3 API port.
    port: 9000
    # Web console port.
    consolePort: 9001

  # Image used by the bucket-init Job (minio/mc).
  mcImage:
    repository: minio/mc
    tag: latest
    pullPolicy: IfNotPresent
