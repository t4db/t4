apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "strata.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "strata.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "strata.headlessServiceName" . }}
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "strata.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "strata.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "strata.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: strata
          image: {{ include "strata.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          # Build args at runtime so --advertise-peer can include the pod name,
          # which is only known via the downward API.
          command: ["/bin/sh", "-c"]
          args:
            - |
              exec /strata run \
                --data-dir={{ .Values.config.dataDir | quote }} \
                --listen={{ .Values.config.listenAddr | quote }} \
                --metrics-addr={{ .Values.config.metricsAddr | quote }} \
                --node-id="${MY_POD_NAME}" \
                --log-level={{ .Values.config.logLevel | quote }} \
                --read-consistency={{ .Values.config.readConsistency | quote }} \
                --follower-wait-mode={{ .Values.config.followerWaitMode | quote }} \
                --follower-max-retries={{ .Values.config.followerMaxRetries }} \
                --wal-sync-upload={{ .Values.config.walSyncUpload | quote }} \
                --segment-max-size-mb={{ .Values.config.segmentMaxSizeMb }} \
                --segment-max-age-sec={{ .Values.config.segmentMaxAgeSec }} \
                --checkpoint-interval-min={{ .Values.config.checkpointIntervalMin }} \
                {{- if gt (int .Values.replicaCount) 1 }}
                --peer-listen={{ .Values.config.peerListenAddr | quote }} \
                {{- if .Values.advertiseAddr }}
                --advertise-peer={{ .Values.advertiseAddr | quote }} \
                {{- else }}
                --advertise-peer="${MY_POD_NAME}{{ include "strata.peerDomainSuffix" . }}" \
                {{- end }}
                {{- end }}
                {{- if .Values.s3.bucket }}
                --s3-bucket={{ .Values.s3.bucket | quote }} \
                {{- if .Values.s3.prefix }}
                --s3-prefix={{ .Values.s3.prefix | quote }} \
                {{- end }}
                {{- if .Values.s3.endpoint }}
                --s3-endpoint={{ .Values.s3.endpoint | quote }} \
                {{- end }}
                {{- end }}
                {{- if .Values.tls.client.enabled }}
                --client-tls-cert=/etc/strata/tls/client/tls.crt \
                --client-tls-key=/etc/strata/tls/client/tls.key \
                {{- if (lookup "v1" "Secret" .Release.Namespace .Values.tls.client.secretName).data }}
                {{- if index (lookup "v1" "Secret" .Release.Namespace .Values.tls.client.secretName).data "ca.crt" }}
                --client-tls-ca=/etc/strata/tls/client/ca.crt \
                {{- end }}
                {{- end }}
                {{- end }}
                {{- if .Values.tls.peer.enabled }}
                --peer-tls-cert=/etc/strata/tls/peer/tls.crt \
                --peer-tls-key=/etc/strata/tls/peer/tls.key \
                --peer-tls-ca=/etc/strata/tls/peer/ca.crt \
                {{- end }}
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- $secretName := include "strata.s3SecretName" . }}
            {{- if $secretName }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: AWS_SECRET_ACCESS_KEY
            {{- end }}
            {{- if .Values.s3.region }}
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.s3.region | quote }}
            {{- end }}
          ports:
            - name: client
              containerPort: {{ (split ":" .Values.config.listenAddr)._1 | default 3379 }}
              protocol: TCP
            {{- if gt (int .Values.replicaCount) 1 }}
            - name: peer
              containerPort: {{ (split ":" .Values.config.peerListenAddr)._1 | default 3380 }}
              protocol: TCP
            {{- end }}
            - name: metrics
              containerPort: {{ (split ":" .Values.config.metricsAddr)._1 | default 9090 }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.config.dataDir }}
            {{- if .Values.tls.client.enabled }}
            - name: tls-client
              mountPath: /etc/strata/tls/client
              readOnly: true
            {{- end }}
            {{- if .Values.tls.peer.enabled }}
            - name: tls-peer
              mountPath: /etc/strata/tls/peer
              readOnly: true
            {{- end }}
            # readOnlyRootFilesystem requires a writable tmp dir for the shell wrapper.
            - name: tmp
              mountPath: /tmp
      volumes:
        {{- if .Values.tls.client.enabled }}
        - name: tls-client
          secret:
            secretName: {{ .Values.tls.client.secretName }}
        {{- end }}
        {{- if .Values.tls.peer.enabled }}
        - name: tls-peer
          secret:
            secretName: {{ .Values.tls.peer.secretName }}
        {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "strata.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
        {{- with .Values.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution }}
        {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        annotations:
          {{- toYaml .Values.persistence.annotations | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ if eq .Values.persistence.storageClass "-" }}""{{- else }}{{ .Values.persistence.storageClass }}{{- end }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
