{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "strata.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "strata.labels" . | nindent 4 }}
  annotations:
    {{- if and .Values.s3.useIRSA .Values.s3.iamRoleArn }}
    eks.amazonaws.com/role-arn: {{ .Values.s3.iamRoleArn | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
