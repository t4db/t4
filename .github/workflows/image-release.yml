name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
      image_tag: ${{ steps.image_tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: |
          flags=(--draft --title "$TAG_NAME" --generate-notes)
          if [[ "$TAG_NAME" == *-* ]]; then
            flags+=(--prerelease)
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists"
          else
            gh release create "$TAG_NAME" "${flags[@]}"
          fi

      - name: Prepare image tag
        id: image_tag
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: |
          image_tag="${TAG_NAME#v}"
          echo "image_tag=${image_tag//+/-}" >> "$GITHUB_OUTPUT"

  build-image:
    name: Build tagged image
    runs-on: ubuntu-latest
    needs:
      - release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push tagged image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository }}:${{ needs.release.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-binaries:
    name: Build binaries (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs:
      - release
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "dist/t4-${GOOS}-${GOARCH}" \
            ./cmd/t4

      - name: Upload binary to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" ./dist/t4-${{ matrix.goos }}-${{ matrix.goarch }} --clobber

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: t4-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/t4-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  checksums:
    name: Publish checksums
    runs-on: ubuntu-latest
    needs:
      - release
      - build-binaries
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: t4-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum t4-* > checksums.txt

      - name: Upload checksums to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" ./dist/checksums.txt --clobber
