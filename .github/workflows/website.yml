name: Website

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'docs/**'
      - '.github/workflows/website.yml'
  pull_request:
    branches: ["**"]
    paths:
      - 'website/**'
      - 'docs/**'
      - '.github/workflows/website.yml'
  workflow_dispatch:

permissions:
  contents: read

# Only one deployment runs at a time; don't cancel in-flight deployments.
concurrency:
  group: website-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - uses: actions/configure-pages@v5
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        id: pages

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build
        working-directory: website
        run: npm run build
        env:
          SITE: ${{ steps.pages.outputs.origin || 'https://t4db.github.io' }}
          BASE_PATH: ${{ steps.pages.outputs.base_path || '/t4' }}
          PUBLIC_POSTHOG_KEY: ${{ vars.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ vars.PUBLIC_POSTHOG_HOST }}

      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        with:
          path: website/dist

  deploy:
    name: Deploy
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
