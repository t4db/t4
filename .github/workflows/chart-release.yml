name: Release Helm Chart

on:
  push:
    tags:
      - "chart/v*"   # e.g. chart/v0.1.0

permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

jobs:
  release:
    name: Package & publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Extract versions from tag and git
        # Tag format: chart/v1.2.3  →  CHART_VERSION=1.2.3
        # APP_VERSION is taken from the most recent v* (app) tag on the repo.
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. chart/v0.2.3
          echo "CHART_VERSION=${TAG#chart/v}" >> "$GITHUB_ENV"
          APP_VERSION=$(git tag --list 'v*' --sort=-version:refname | grep -v '^chart/' | head -1 | sed 's/^v//')
          if [ -z "${APP_VERSION}" ]; then
            echo "ERROR: no app version tag (v*) found in repository" >&2
            exit 1
          fi
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Stamp version into Chart.yaml
        run: |
          sed -i "s/^version:.*/version: ${CHART_VERSION}/" charts/t4/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${APP_VERSION}\"/" charts/t4/Chart.yaml

      - name: Lint chart
        run: helm lint charts/t4

      - name: Package chart
        run: helm package charts/t4 --destination dist/

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
                --username "${{ github.repository_owner }}" \
                --password-stdin

      - name: Push chart to GHCR
        run: |
          helm push dist/t4-${CHART_VERSION}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts
